{{define "content"}}
<div class="flex justify-between items-center mb-6">
    <h1 class="text-3xl font-bold">Event Stream</h1>
    <div class="join">
        <button class="btn btn-sm btn-outline join-item">Pause</button>
        <button class="btn btn-sm btn-outline join-item text-error">Clear Logs</button>
    </div>
</div>

<div class="mockup-code bg-base-300 text-sm shadow-2xl overflow-y-auto max-h-[70vh]">
    <pre data-prefix=">"><code>Starting listener on TimescaleDB hypertable...</code></pre>
    {{range .}}
    <pre data-prefix="{{.Time}}" class="text-success"><code>[INGEST] Node {{.DeviceID}}: Payload Validated {temp: {{.Temperature}}}</code></pre>
    {{else}}
    <pre data-prefix="!" class="text-warning"><code>No events found in database.</code></pre>
    {{end}}
</div>
{{end}}
