<!DOCTYPE html>
<html lang="en" data-theme="nord">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Notebook IoT</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen bg-base-200 flex items-center justify-center p-4">
    <div class="card w-full max-w-md bg-base-100 shadow-xl border border-base-300">
        <div class="card-body">
            <div class="flex items-center gap-3 mb-8 justify-center">
                <div class="w-10 h-10 bg-primary text-primary-content rounded-lg flex items-center justify-center font-bold text-xl">
                    CC
                </div>
                <span class="text-3xl font-mono tracking-tighter font-bold">Notebook</span>
            </div>
            
            <h2 class="text-2xl font-bold text-center mb-6">Admin Login</h2>
            
            {{if .Error}}
            <div class="alert alert-error mb-6">
                <i data-lucide="alert-circle"></i>
                <span>{{.Error}}</span>
            </div>
            {{end}}

            <form action="/login" method="POST">
                <div class="form-control w-full">
                    <label class="label">
                        <span class="label-text">Username</span>
                    </label>
                    <input type="text" name="username" placeholder="admin" class="input input-bordered w-full" required />
                </div>
                
                <div class="form-control w-full mt-4">
                    <label class="label">
                        <span class="label-text">Password</span>
                    </label>
                    <input type="password" name="password" placeholder="••••••••" class="input input-bordered w-full" required />
                </div>
                
                <div class="form-control mt-8">
                    <button type="submit" class="btn btn-primary w-full text-lg">
                        Sign In
                    </button>
                </div>
            </form>
        </div>
    </div>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
