{{define "content"}}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div class="mb-8">
    <h1 class="text-3xl font-bold">Page Telemetry</h1>
    <p class="text-base-content/60 text-sm italic">Events (Last 24 Hours)</p>
</div>

<div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
    <div class="card bg-base-100 shadow-xl border border-base-300 p-6">
        <h3 class="font-bold text-lg mb-4 flex items-center gap-2"><i data-lucide="thermometer" class="text-orange-500"></i> Core Temperature</h3>
        <canvas id="tempChart"></canvas>
    </div>

    <div class="card bg-base-100 shadow-xl border border-base-300 p-6">
        <h3 class="font-bold text-lg mb-4 flex items-center gap-2"><i data-lucide="activity" class="text-blue-500"></i> Handshake Latency (ms)</h3>
        <canvas id="latencyChart"></canvas>
    </div>
</div>

<script>
    const ctxTemp = document.getElementById('tempChart');
    new Chart(ctxTemp, {
        type: 'line',
        data: {
            labels: ['12:00', '13:00', '14:00', '15:00', '16:00', '17:00'],
            datasets: [{
                label: 'Celsius',
                data: [22, 23.5, 24, 23.8, 25, 24.2],
                borderColor: '#f97316',
                tension: 0.4,
                fill: true,
                backgroundColor: 'rgba(249, 115, 22, 0.1)'
            }]
        },
        options: { responsive: true, plugins: { legend: { display: false } } }
    });

    const ctxLat = document.getElementById('latencyChart');
    new Chart(ctxLat, {
        type: 'bar',
        data: {
            labels: ['Node A1', 'Node A2', 'Node A3', 'Node B1'],
            datasets: [{
                label: 'ms',
                data: [84, 120, 65, 95],
                backgroundColor: '#3b82f6',
                borderRadius: 8
            }]
        },
        options: { responsive: true, plugins: { legend: { display: false } } }
    });
</script>
{{end}}
